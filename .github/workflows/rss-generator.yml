name: JSON'dan Rastgele RSS Oluşturucu

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-shuffle-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js Ortamını Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları Kur
        run: npm install feed

      - name: JSON'u Oku, Karıştır ve Tek Bir RSS Ögesi Oluştur
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { Feed } = require('feed');

            const jsonPath = './rss-feed-json.json';
            const rawData = fs.readFileSync(jsonPath, 'utf8');
            let quotes = JSON.parse(rawData);

            for (let i = quotes.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [quotes[i], quotes[j]] = [quotes[j], quotes[i]];
            }

            const feed = new Feed({
              title: "Saatlik Rastgele Söz Akışı",
              description: "Her saat rastgele seçilen bir sözü gösteren güncel RSS feed'i.",
              id: "https://github.com/cemal201138/rss-feed",
              link: "https://github.com/cemal201138/rss-feed",
              language: "tr",
              copyright: `Tüm Hakları Saklıdır ${new Date().getFullYear()}`,
              generator: "GitHub Actions RSS Generator"
            });

            const randomQuote = quotes[0];
            
            feed.addItem({
              title: randomQuote.title || "Günün Rastgele Sözü",
              id: `quote-${Date.now()}`,
              link: "https://github.com/cemal201138/rss-feed",
              description: randomQuote.description,
              // 'author' kısmını doğrudan string olarak vermek yerine 
              // XML'de <author> etiketi olarak düzgün çıkması için bu şekilde tanımlıyoruz:
              author: [{ name: randomQuote.author || "Anonim" }],
              date: new Date()
            });

            // RSS 2.0 çıktısı üretilirken 'author' alanı feed kütüphanesi tarafından 
            // yapılandırılır. Eğer kütüphane otomatik olarak <author> eklemezse, 
            // feed'in rss2() fonksiyonu standartlara göre çıktıyı oluşturur.
            fs.writeFileSync('./feed.xml', feed.rss2());

      - name: Değişiklikleri Depoya Yükle (Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if ! git diff-index --quiet HEAD; then
            git add feed.xml
            git commit -m "Güncelleme: RSS için yeni rastgele söz seçildi"
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "Herhangi bir değişiklik yok."
          fi
