name: JSON'dan Rastgele RSS Oluşturucu

on:
  schedule:
    # Her saat başı otomatik çalışır (00:00, 01:00, 02:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # İstediğiniz zaman elle tetiklemek için

permissions:
  contents: write # Oluşturulan feed.xml dosyasını repoya yazabilmek için

jobs:
  build-and-shuffle-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Node.js Ortamını Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları Kur
        # RSS standardı üretmek için 'feed' kütüphanesini hızlıca kuruyoruz
        run: npm install feed

      - name: JSON'u Oku, Karıştır ve Tek Bir RSS Ögesi Oluştur
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { Feed } = require('feed');

            // 1. JSON dosyasını yerel dizinden oku
            const jsonPath = './rss-feed-json.json';
            if (!fs.existsSync(jsonPath)) {
              core.setFailed('rss-feed-json.json dosyası bulunamadı!');
              return;
            }
            
            const rawData = fs.readFileSync(jsonPath, 'utf8');
            let quotes = JSON.parse(rawData);

            if (!Array.isArray(quotes) || quotes.length === 0) {
              core.setFailed('JSON dosyası boş veya bir dizi değil!');
              return;
            }

            // 2. Fisher-Yates algoritması ile sözleri rastgele karıştır (Shuffle)
            for (let i = quotes.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [quotes[i], quotes[j]] = [quotes[j], quotes[i]];
            }

            // 3. RSS Feed yapısını oluştur
            const feed = new Feed({
              title: "Saatlik Rastgele Söz Akışı",
              description: "Her saat rastgele seçilen bir sözü gösteren güncel RSS feed'i.",
              id: "https://github.com/cemal201138/rss-feed",
              link: "https://github.com/cemal201138/rss-feed",
              language: "tr",
              copyright: `Tüm Hakları Saklıdır ${new Date().getFullYear()}`,
              generator: "GitHub Actions RSS Generator"
            });

            // 4. Karıştırılmış diziden SADECE İLK elemanı (rastgele seçileni) feed'e ekle
            const randomQuote = quotes[0];
            
            feed.addItem({
              title: randomQuote.title || "Günün Rastgele Sözü",
              id: `quote-${Date.now()}`, // Her saat benzersiz ID üreterek RSS okuyucunun yeni bir öge algılamasını sağlar
              link: "https://github.com/cemal201138/rss-feed",
              description: randomQuote.description,
              author: [{ name: randomQuote.author || "Anonim" }],
              date: new Date()
            });

            // 5. XML çıktısını feed.xml olarak kaydet
            fs.writeFileSync('./feed.xml', feed.rss2());
            console.log('feed.xml için rastgele bir söz başarıyla seçildi ve yazıldı.');

      - name: Değişiklikleri Depoya Yükle (Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          # Sadece feed.xml içeriği gerçekten değiştiyse commit yapar
          git diff-index --quiet HEAD || git commit -m "Güncelleme: RSS için yeni rastgele söz seçildi"
          git push
